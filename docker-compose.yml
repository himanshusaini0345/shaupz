version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: shaupz-mongo
    command: ["--replSet", "rs0"]
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: shaupz-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
